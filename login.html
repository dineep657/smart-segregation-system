<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Smart Segregation | Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:linear-gradient(145deg,#0b2f2c,#051f1d);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;position:relative;overflow-x:hidden;}
.bg{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
.leaf{position:absolute;background:rgba(110,210,150,.08);border-radius:80% 0 80% 0;transform:rotate(45deg);animation:floatLeaf 20s infinite ease-in-out;}
.bubble{position:absolute;background:radial-gradient(circle,rgba(80,200,140,.2),rgba(40,140,100,.05));border-radius:50%;animation:floatBubble 28s infinite alternate;}
@keyframes floatLeaf{0%{transform:translateY(0)rotate(0);opacity:.2}50%{transform:translateY(15vh)rotate(10deg);opacity:.5}100%{transform:translateY(-5vh)rotate(20deg);opacity:.2}}
@keyframes floatBubble{0%{transform:translateY(100vh)scale(.5);opacity:0}30%{opacity:.3}100%{transform:translateY(-20vh)scale(1.2);opacity:0}}
.card{position:relative;z-index:10;width:100%;max-width:460px;background:rgba(18,32,30,.85);backdrop-filter:blur(12px);border-radius:2.5rem;box-shadow:0 25px 45px rgba(0,0,0,.4),0 0 0 1px rgba(80,210,150,.2);overflow:hidden;}
.card-body{padding:2rem 2rem 2.5rem;}
.brand{text-align:center;margin-bottom:1.8rem;}
.icon-circle{background:linear-gradient(135deg,#2ecc71,#1f8a4c);width:70px;height:70px;border-radius:28px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 12px 18px -8px rgba(0,0,0,.3);}
.icon-circle i{font-size:2.8rem;color:#fff;}
.brand h1{font-size:1.9rem;font-weight:700;background:linear-gradient(135deg,#EFFAF3,#B9F6CA);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:.3rem;}
.brand .sub{font-size:.85rem;color:#9bc5b4;display:flex;align-items:center;justify-content:center;gap:8px;}
.input-group{margin-bottom:1.3rem;}
.input-group label{display:flex;align-items:center;gap:8px;font-size:.85rem;font-weight:500;color:#c6f0df;margin-bottom:.5rem;}
.input-group label i{color:#2ecc71;}
.input-field{width:100%;padding:.85rem 1rem;background:rgba(10,22,20,.7);border:1px solid rgba(70,170,120,.5);border-radius:1.2rem;font-size:1rem;color:#f0f7f3;outline:none;transition:all .2s;font-family:'Inter',sans-serif;}
.input-field:focus{border-color:#2ecc71;box-shadow:0 0 0 3px rgba(46,204,113,.3);}
.input-field::placeholder{color:#6b9787;}
.pwd-wrap{position:relative;}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#9bc5b4;cursor:pointer;font-size:1.1rem;}
.form-options{display:flex;justify-content:space-between;align-items:center;margin:.5rem 0 1.4rem;font-size:.85rem;}
.checkbox-label{display:flex;align-items:center;gap:8px;color:#cbe9de;cursor:pointer;}
.checkbox-label input{accent-color:#2ecc71;width:16px;height:16px;}
.forgot-link{color:#b0e0c8;text-decoration:none;font-weight:500;}
.forgot-link:hover{color:#2ecc71;}
.login-btn{width:100%;background:linear-gradient(105deg,#27ae60,#1e874b);border:none;padding:.9rem;border-radius:2rem;font-size:1rem;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:all .25s;box-shadow:0 6px 14px rgba(0,0,0,.3);}
.login-btn:hover{background:linear-gradient(105deg,#2ecc71,#229954);transform:translateY(-2px);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.msg-area{margin-top:.8rem;font-size:.82rem;text-align:center;min-height:38px;}
.error-msg{color:#ffb47b;background:rgba(220,80,40,.15);padding:.5rem .8rem;border-radius:1rem;display:block;}
.success-msg{color:#b0ffcf;background:rgba(46,204,113,.2);padding:.5rem .8rem;border-radius:1rem;display:block;}
.demo-badge{margin-top:1rem;background:rgba(46,204,113,.12);border-radius:1.2rem;padding:.75rem;text-align:center;border:1px solid rgba(46,204,113,.3);}
.demo-badge p{font-size:.73rem;color:#bbe5d3;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap;}
.demo-badge strong{background:#1f5e46;padding:.15rem .5rem;border-radius:20px;font-family:monospace;color:#e6ffed;cursor:pointer;}
.demo-badge strong:hover{background:#27ae60;}
.divider{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0;}
.divider hr{flex:1;border:none;border-top:1px solid rgba(70,170,120,.3);}
.divider span{color:#9bc5b4;font-size:.75rem;}
.signup-btn{width:100%;background:transparent;border:1px solid rgba(70,170,120,.5);padding:.8rem;border-radius:2rem;font-size:.9rem;font-weight:600;color:#9bc5b4;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;transition:all .25s;}
.signup-btn:hover{background:rgba(46,204,113,.1);color:#2ecc71;border-color:#2ecc71;}
.footer-note{text-align:center;margin-top:1.2rem;font-size:.7rem;color:#598d78;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
</style>
</head>
<body>
<div class="bg">
  <div class="leaf" style="top:10%;left:5%;width:55px;height:55px;animation-duration:22s"></div>
  <div class="leaf" style="top:70%;left:85%;width:70px;height:70px;animation-duration:19s;animation-delay:-3s"></div>
  <div class="leaf" style="top:40%;left:20%;width:40px;height:40px;animation-duration:26s"></div>
  <div class="bubble" style="width:140px;height:140px;bottom:-40px;left:-30px;animation-duration:28s"></div>
  <div class="bubble" style="width:200px;height:200px;top:-80px;right:-60px;animation-duration:34s;opacity:.2"></div>
</div>

<div class="card" id="mainCard">
  <div class="card-body">
    <div class="brand">
      <div class="icon-circle"><i class="fas fa-leaf"></i></div>
      <h1>Smart Segregation</h1>
      <div class="sub"><i class="fas fa-recycle"></i><span>AI-Powered Waste Management</span><i class="fas fa-microchip"></i></div>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="input-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input id="uname" class="input-field" type="text" placeholder="admin / operator" autocomplete="username">
        <div id="unameErr" style="font-size:.72rem;color:#e74c3c;margin-top:3px;display:none"><i class="fas fa-exclamation-circle"></i> Username is required</div>
      </div>
      <div class="input-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <div class="pwd-wrap">
          <input id="upass" class="input-field" type="password" placeholder="••••••" autocomplete="current-password">
          <button type="button" class="eye-btn" id="eyeBtn"><i class="far fa-eye-slash"></i></button>
        </div>
        <div id="passErr" style="font-size:.72rem;color:#e74c3c;margin-top:3px;display:none"><i class="fas fa-exclamation-circle"></i> Password is required</div>
      </div>
      <div class="form-options">
        <label class="checkbox-label"><input type="checkbox" id="remMe"> Keep me signed in</label>
        <a href="#" class="forgot-link" id="forgotLink">Forgot access?</a>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Access Dashboard
      </button>
    </form>

    <div class="msg-area" id="msgArea"></div>

    <div class="demo-badge">
      <p><i class="fas fa-flask" style="color:#f5b042"></i>
        Demo: <strong onclick="fill('admin','segregate2025')">admin/segregate2025</strong>
        <strong onclick="fill('operator','greenbin')">operator/greenbin</strong>
        <strong onclick="fill('supervisor','eco123')">supervisor/eco123</strong>
      </p>
    </div>

    <div class="divider"><hr><span>OR</span><hr></div>

    <button class="signup-btn" onclick="window.location.href='signup.html'">
      <i class="fas fa-user-plus"></i> Create New Account
    </button>

    <div class="footer-note">
      <i class="fas fa-database" style="color:#2ecc71"></i> Connected to MySQL · Smart Segregation v2.0
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:3000/api';

// Demo fill
function fill(u, p){
  document.getElementById('uname').value = u;
  document.getElementById('upass').value = p;
  ['uname','upass'].forEach(id=>{
    const el=document.getElementById(id);
    el.style.borderColor='#2ecc71';
    setTimeout(()=>el.style.borderColor='',800);
  });
}

// Show/hide password
document.getElementById('eyeBtn').addEventListener('click', function(){
  const inp = document.getElementById('upass');
  const ic  = this.querySelector('i');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  ic.className = inp.type === 'text' ? 'far fa-eye' : 'far fa-eye-slash';
});

// Forgot link
document.getElementById('forgotLink').addEventListener('click', e=>{
  e.preventDefault();
  showMsg('Click a demo badge above to auto-fill, or contact your admin.', false);
});

// Auto-fill remembered username
const saved = localStorage.getItem('ssg_remember');
if (saved) { document.getElementById('uname').value = saved; document.getElementById('remMe').checked = true; }

function showMsg(msg, isErr){
  const el = document.getElementById('msgArea');
  el.innerHTML = `<span class="${isErr?'error-msg':'success-msg'}">${msg}</span>`;
  if (isErr) setTimeout(()=>el.innerHTML='', 4000);
}

// Demo credentials fallback
const LOCAL_USERS = [
  {username:'admin',      password:'segregate2025', role:'System Administrator'},
  {username:'operator',   password:'greenbin',      role:'Waste Operator'},
  {username:'supervisor', password:'eco123',        role:'Site Supervisor'},
  {username:'tech',       password:'smartbin',      role:'IoT Technician'}
];

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const u = document.getElementById('uname').value.trim();
  const p = document.getElementById('upass').value;

  // Inline validation
  let ok = true;
  if (!u){ document.getElementById('unameErr').style.display='block'; ok=false; }
  else document.getElementById('unameErr').style.display='none';
  if (!p){ document.getElementById('passErr').style.display='block'; ok=false; }
  else document.getElementById('passErr').style.display='none';
  if (!ok) return;

  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';

  let user = null;

  // 1. Try Java + MySQL backend
  try {
    const res  = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    const data = await res.json();
    if (data.success) user = { username: data.username, role: data.role, token: data.token };
    else {
      showMsg('❌ Invalid credentials. Check username / password.', true);
      const card = document.getElementById('mainCard');
      card.style.animation = 'shake .4s'; setTimeout(()=>card.style.animation='', 400);
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Dashboard';
      return;
    }
  } catch(err) {
    // 2. Java offline — fallback to local users
    const found = LOCAL_USERS.find(c => c.username.toLowerCase() === u.toLowerCase() && c.password === p);
    if (found) user = { username: found.username, role: found.role, token: 'local_' + Date.now() };
    else {
      showMsg('❌ Invalid credentials. Also could not reach Java server.', true);
      btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Access Dashboard';
      return;
    }
  }

  // Success
  if (document.getElementById('remMe').checked) localStorage.setItem('ssg_remember', u);
  else localStorage.removeItem('ssg_remember');
  localStorage.setItem('ssg_token', user.token);
  localStorage.setItem('ssg_user', JSON.stringify({ username: user.username, role: user.role }));
  showMsg(`✅ Welcome back, ${user.role}!`, false);
  btn.innerHTML = '<i class="fas fa-check"></i> Redirecting...';
  setTimeout(() => { window.location.href = 'index.html'; }, 900);
});
</script>
</body>
</html>
