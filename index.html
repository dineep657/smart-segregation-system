.bg-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none;}

.pwd-wrap{position:relative;}
.toggle-pwd{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:#9bc5b4;cursor:pointer;font-size:1.1rem;}

.login-btn{width:100%;background:linear-gradient(105deg,#27ae60,#1e874b);border:none;padding:.9rem;border-radius:2rem;font-size:1rem;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;gap:12px;cursor:pointer;transition:all .25s;}

/* DET PANEL */

<body>

<script>
// =============================================================
//  Smart Segregation System — Frontend SPA
//  All business logic lives in Java backend (SmartSegServer.java)
//  This JS only handles UI rendering and API calls.
// =============================================================

const API   = 'http://localhost:3000/api';
let token   = localStorage.getItem('ssg_token') || null;
let curUser = JSON.parse(localStorage.getItem('ssg_user') || 'null');
let authMode= 'login';
let pollTimer = null;

// ---------- UTILITY ----------
function toast(msg, type='info'){
  const c={success:'#2ecc71',warning:'#f39c12',danger:'#e74c3c',info:'#3498db'};
  const t=document.createElement('div');
  t.className='toast'; t.style.background=c[type]||c.info; t.innerHTML=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),4000);
}

async function api(path, method='GET', body=null){
  const opts={method, headers:{'Content-Type':'application/json'}};
  if(token) opts.headers['Authorization']='Bearer '+token;
  if(body)  opts.body=JSON.stringify(body);
  const r=await fetch(API+path, opts);
  return r.json();
}

function setTitle(h1, p=''){
  document.getElementById('pageTitle').innerHTML=
    `<h1>${h1}</h1><p>${p} <span class="java-badge" style="font-size:.65rem"><i class="fas fa-coffee"></i> Java API</span></p>`;
}

// ---------- AUTH ----------
function renderAuth(){
  const box=document.getElementById('loginBox');
  if(authMode==='login'){
    box.innerHTML=`
    <div class="login-card">
      <div class="brand">
        <div class="icon-circle"><i class="fas fa-leaf"></i></div>
        <h1>Smart Segregation</h1>
        <div class="sub"><i class="fas fa-recycle"></i><span>AI-Powered Waste Management</span><i class="fas fa-microchip"></i></div>
      </div>
      <form id="loginForm">
        <div class="input-group">
          <label><i class="fas fa-user"></i> Username</label>
          <input id="uname" class="input-field" type="text" placeholder="admin / operator" autocomplete="username">
        </div>
        <div class="input-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <div class="pwd-wrap">
            <input id="upass" class="input-field" type="password" placeholder="••••••" autocomplete="current-password">
            <button type="button" class="toggle-pwd" id="eyeBtn"><i class="far fa-eye-slash"></i></button>
          </div>
        </div>
        <div class="form-options">
          <label class="checkbox-label"><input type="checkbox" id="remMe"> Keep me signed in</label>
          <a href="#" class="forgot-link" id="forgotLink">Forgot access?</a>
        </div>
        <button class="login-btn" type="submit" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Access Dashboard</button>
      </form>
      <div class="toggle-link" id="switchMode">No account? <span>Sign up</span></div>
      <div class="demo-badge">Demo: <strong>admin</strong>/<strong>segregate2025</strong> &nbsp;|&nbsp; <strong>operator</strong>/<strong>greenbin</strong></div>
      <div class="msg-area" id="authMsg"></div>
    </div>`;
  } else {
    box.innerHTML=`
    <div class="login-card">
      <div class="brand">
        <div class="icon-circle"><i class="fas fa-user-plus"></i></div>
        <h1>Create Account</h1>
        <div class="sub"><i class="fas fa-recycle"></i><span>Join Smart Segregation</span></div>
      </div>
      <form id="signupForm">
        <div class="input-group"><label><i class="fas fa-user"></i> Username</label><input id="sUname" class="input-field" type="text" placeholder="choose username"></div>
        <div class="input-group"><label><i class="fas fa-lock"></i> Password</label><input id="sPass" class="input-field" type="password" placeholder="create password"></div>
        <div class="input-group"><label><i class="fas fa-id-badge"></i> Role</label><input id="sRole" class="input-field" type="text" value="Waste Manager"></div>
        <div class="input-group"><label><i class="fas fa-envelope"></i> Email</label><input id="sEmail" class="input-field" type="email" placeholder="your@email.com"></div>
        <button class="login-btn" type="submit"><i class="fas fa-user-plus"></i> Sign Up & Enter</button>
      </form>
      <div class="toggle-link" id="switchMode">Have an account? <span>Login</span></div>
      <div class="msg-area" id="authMsg"></div>
    </div>`;
  }
  wireAuth();
}

function authMsg(msg,err){
  const el=document.getElementById('authMsg');
  if(el) el.innerHTML=`<div class="${err?'error-msg':'success-msg'}">${msg}</div>`;
  if(err) setTimeout(()=>{if(el)el.innerHTML='';},3500);
}

function wireAuth(){
  document.getElementById('switchMode')?.addEventListener('click',()=>{authMode=authMode==='login'?'signup':'login';renderAuth();});
  document.getElementById('forgotLink')?.addEventListener('click',e=>{e.preventDefault();authMsg('Demo: admin/segregate2025 | operator/greenbin | supervisor/eco123',false);});
  document.getElementById('eyeBtn')?.addEventListener('click',function(){
    const i=document.getElementById('upass');
    const ic=this.querySelector('i');
    i.type=i.type==='password'?'text':'password';
    ic.className=i.type==='text'?'far fa-eye':'far fa-eye-slash';
  });
  // Auto-fill remembered user
  const saved=localStorage.getItem('ssg_remember');
  if(saved&&document.getElementById('uname')){document.getElementById('uname').value=saved;document.getElementById('remMe').checked=true;}

  document.getElementById('loginForm')?.addEventListener('submit',async e=>{
    e.preventDefault();
    const u=document.getElementById('uname').value.trim();
    const p=document.getElementById('upass').value;
    if(!u||!p){authMsg('Please fill all fields',true);return;}
    const btn=document.getElementById('loginBtn');
    btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Authenticating via Java...';
    try{
      // POST to Java /api/login
      const data=await api('/login','POST',{username:u,password:p});
      if(data.success){
        token=data.token;
        curUser={username:data.username,role:data.role,email:data.email};
        localStorage.setItem('ssg_token',token);
        localStorage.setItem('ssg_user',JSON.stringify(curUser));
        if(document.getElementById('remMe')?.checked) localStorage.setItem('ssg_remember',u);
        else localStorage.removeItem('ssg_remember');
        authMsg(`✅ Welcome ${data.role}! Loading dashboard...`,false);
        setTimeout(enterDash,700);
      } else {
        authMsg(data.message||'Invalid credentials',true);
        btn.disabled=false; btn.innerHTML='<i class="fas fa-sign-in-alt"></i> Access Dashboard';
      }
    }catch(err){
      authMsg('⚠ Cannot reach Java server. Make sure it is running.',true);
      btn.disabled=false; btn.innerHTML='<i class="fas fa-sign-in-alt"></i> Access Dashboard';
    }
  });

  document.getElementById('signupForm')?.addEventListener('submit',async e=>{
    e.preventDefault();
    const u=document.getElementById('sUname').value.trim();
    const p=document.getElementById('sPass').value;
    const r=document.getElementById('sRole').value.trim()||'Waste Manager';
    const em=document.getElementById('sEmail').value.trim();
    if(!u||!p){authMsg('Username and password required',true);return;}
    try{
      // POST to Java /api/signup
      const data=await api('/signup','POST',{username:u,password:p,role:r,email:em});
      if(data.success){
        token=data.token; curUser={username:data.username,role:data.role};
        localStorage.setItem('ssg_token',token);
        localStorage.setItem('ssg_user',JSON.stringify(curUser));
        authMsg(`🎉 Account created! Welcome ${r}`,false);
        setTimeout(enterDash,700);
      } else authMsg(data.message||'Sign up failed',true);
    }catch(err){ authMsg('⚠ Cannot reach Java server',true); }
  });
}

function enterDash(){
  document.getElementById('authOverlay').classList.add('hidden');
  const dw=document.getElementById('dashWrap');
  dw.style.display='block';
  setTimeout(()=>dw.classList.add('visible'),10);
  document.getElementById('unameDisplay').textContent=curUser?.username||'User';
  navigate('dashboard');
}

// ---------- NAVIGATION ----------
function navigate(page){
  clearInterval(pollTimer);
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===page));
  const pages={dashboard:renderDashboard,monitoring:renderMonitoring,bins:renderBins,ai:renderAI,reports:renderReports};
  (pages[page]||renderDashboard)();
  window.scrollTo(0,0);
}

document.querySelectorAll('.nav-item').forEach(n=>n.addEventListener('click',()=>navigate(n.dataset.page)));
document.getElementById('sidebarLogo')?.addEventListener('click',()=>navigate('dashboard'));
document.getElementById('notifBtn')?.addEventListener('click',()=>navigate('reports'));
document.getElementById('logoutBtn')?.addEventListener('click',async()=>{
  clearInterval(pollTimer);
  try{ await api('/logout','POST'); }catch(e){}
  token=null; curUser=null;
  localStorage.removeItem('ssg_token'); localStorage.removeItem('ssg_user');
  document.getElementById('dashWrap').classList.remove('visible');
  setTimeout(()=>{document.getElementById('dashWrap').style.display='none';},400);
  document.getElementById('authOverlay').classList.remove('hidden');
  authMode='login'; renderAuth();
});
</script>

async function runImageDetection(){
  const btn=document.getElementById('detectBtn');
  const imgEl=document.getElementById('imgPreview');
  if(!imgEl.src||imgEl.src===window.location.href){showNoWastePopup('no-image');return;}
  btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Detecting...'; btn.disabled=true;

  // Classes COCO-SSD detects that are NOT waste — skip these entirely
  const skipClasses=['person','car','truck','bus','motorcycle','bicycle',
    'dog','cat','bird','horse','sheep','cow','elephant','bear','zebra',
    'giraffe','airplane','train','boat','traffic light','fire hydrant',
    'stop sign','parking meter'];

  // All COCO classes we can map to waste (including potted plant)
  const wasteCocoClasses=Object.keys(COCO_TO_WASTE).filter(k=>COCO_TO_WASTE[k]!==null);

  try{
    let classified=false;

    if(tfReady&&cocoModel){
      const preds=await cocoModel.detect(imgEl);

      // Remove non-waste classes
      const candidates=preds.filter(p=>!skipClasses.includes(p.class));

      // Prefer known waste-mapped classes first
      const knownWaste=candidates.filter(p=>wasteCocoClasses.includes(p.class));
      const toProcess=knownWaste.length>0 ? knownWaste : candidates;

      if(toProcess.length>0){
        drawBBoxes(imgEl,toProcess);
        for(const p of toProcess){
          const map=COCO_TO_WASTE[p.class];
          // Use mapped hint, or the raw COCO label as hint to Java
          await callJavaDetect(map ? map.hint : p.class);
        }
        showDetectedPopup(toProcess.length);
        classified=true;
      } else {
        // COCO found nothing useful — try filename as fallback hint
        const hint=getFilenameHint(btn._file);
        if(hint){
          await callJavaDetect(hint);
          toast(`💡 Context-based classification: "${hint}"`, 'info');
          classified=true;
        }
      }
    } else {
      // TF.js not ready — use filename hint
      const hint=getFilenameHint(btn._file);
      if(hint){
        await callJavaDetect(hint);
        toast(`Java classified by filename: "${hint}"`, 'info');
        classified=true;
      }
    }

    // Only show no-waste popup if nothing could be classified at all
    if(!classified) showNoWastePopup('not-found');

  }catch(e){ toast('Detection error: '+e.message,'danger'); }
  btn.innerHTML='<i class="fas fa-search"></i> Detect Waste'; btn.disabled=false;
}

// Returns a clean hint from filename, or null if filename is generic (IMG_1234 etc.)
function getFilenameHint(file){
  if(!file) return null;
  const name=file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').toLowerCase().trim();
  if(/^(img|dsc|photo|picture|image|pic|screenshot|file|document)[\s\-_]?\d*$/i.test(name)) return null;
  if(/^\d+$/.test(name)) return null;
  if(name.length<3) return null;
  return name;
}

function drawBBoxes(imgEl,preds){
  const canvas=document.getElementById('bboxCanvas');
  canvas.width=imgEl.naturalWidth; canvas.height=imgEl.naturalHeight;
  const ctx=canvas.getContext('2d');
  ctx.drawImage(imgEl,0,0);
  preds.forEach(p=>{
    const map=COCO_TO_WASTE[p.class];
    const label=map?map.label:p.class;
    const [x,y,w,h]=p.bbox;
    ctx.strokeStyle='#2ecc71'; ctx.lineWidth=3; ctx.strokeRect(x,y,w,h);
    ctx.fillStyle='#2ecc71'; ctx.fillRect(x,y-28,Math.max(w,140),28);
    ctx.fillStyle='#fff'; ctx.font='bold 14px Inter,sans-serif';
    ctx.fillText(`${label}  ${Math.round(p.score*100)}%`,x+6,y-8);
  });
  imgEl.style.display='none'; canvas.style.display='block';
}

<script>

// Java: GET /api/bins, POST /api/bins/{id}/pickup, POST /api/bins/{id}/maintain

let selZone='All', allBins=[];

async function renderBins(){
  setTitle('<i class="fas fa-trash-alt"></i> Bin Management','IoT sensors — Java backend');

    <div class="stats-grid" id="binStats"><div style="padding:1rem;color:#6c8b81"><i class="fas fa-spinner fa-spin"></i> Loading from Java...</div></div>

async function loadBinsData(){

    const crit=bins.filter(b=>b.urgency==='CRITICAL').length;

    document.getElementById('notifBadge').textContent=crit;

function renderZones(){
  const zones=['All','Zone A','Zone B','Zone C','Zone D','Zone E'];
  const g=document.getElementById('zoneGrid'); if(!g) return;
  g.innerHTML=zones.map(z=>{
    const zb=z==='All'?allBins:allBins.filter(b=>b.zone===z);
    const avg=zb.length?Math.round(zb.reduce((s,b)=>s+b.fill,0)/zb.length):0;
    const crit=zb.filter(b=>b.urgency==='CRITICAL').length;
    return `<div class="zone-box ${selZone===z?'sel':''}" onclick="selectZone('${z}')">
      <div class="zone-name">${z}</div>
      <div class="zone-stats">${zb.length} bins<br>Avg ${avg}%<br>
        ${crit>0?`<span style="color:#e74c3c">⚠ ${crit} critical</span>`:'<span style="color:#2ecc71">✓ OK</span>'}
      </div></div>`;
  }).join('');
}

window.selectZone=function(z){ selZone=z; renderZones(); renderBinCards(); };

function renderBinCards(){
  const filtered=selZone==='All'?allBins:allBins.filter(b=>b.zone===selZone);

  g.innerHTML=filtered.map(b=>{

    return `<div class="bin-card ${cls}">
      <div class="bin-hdr">
        <div style="display:flex;align-items:center;gap:10px">

          <div style="width:${b.fill}%;height:100%;background:${b.fillColor};border-radius:10px;transition:width .4s"></div>
        </div>
        <div style="font-size:.72rem;color:#6c8b81;margin-top:.3rem">Est. full in: <strong>${b.hoursUntilFull}h</strong></div>
      </div>
      <div class="sensor-row">
        <div class="sensor-cell"><div class="sensor-lbl"><i class="fas fa-thermometer-half"></i> Temp</div><div class="sensor-val">${b.temperature}°C</div></div>
        <div class="sensor-cell"><div class="sensor-lbl"><i class="fas fa-weight-hanging"></i> Weight</div><div class="sensor-val">${b.weight} kg</div></div>
        <div class="sensor-cell"><div class="sensor-lbl"><i class="fas fa-map-marker-alt"></i> Zone</div><div class="sensor-val">${b.zone}</div></div>
        <div class="sensor-cell"><div class="sensor-lbl"><i class="fas fa-calendar-alt"></i> Last Service</div><div class="sensor-val" style="font-size:.75rem">${b.lastMaintenance}</div></div>
      </div>

        <button class="btn-green" onclick="pickupBin('${b.id}')"><i class="fas fa-truck"></i> Schedule Pickup</button>
        <button class="btn-light" onclick="maintainBin('${b.id}')"><i class="fas fa-tools"></i> Maintenance</button>
      </div>
    </div>`;
  }).join('');
}

window.pickupBin=async function(id){
  try{
    // Calls Java: POST /api/bins/{id}/pickup
    const d=await api(`/bins/${id}/pickup`,'POST');
    if(d.success){ toast(`✅ ${d.message}. Pickups today: ${d.pickupsToday}`,'success'); await loadBinsData(); }
    else toast('Error: '+d.message,'danger');
  }catch(e){ toast('⚠ Java server error','warning'); }
};

window.maintainBin=async function(id){
  try{
    // Calls Java: POST /api/bins/{id}/maintain
    const d=await api(`/bins/${id}/maintain`,'POST');
    if(d.success){ toast('🔧 '+d.message,'info'); await loadBinsData(); }
    else toast('Error','danger');
  }catch(e){ toast('⚠ Java server error','warning'); }
};
</script>

      <div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-end">
        <div style="flex:1;min-width:160px">
          <label style="font-size:.75rem;color:#6c8b81;display:block;margin-bottom:.3rem"><i class="fas fa-calendar"></i> Date Range</label>
          <select style="width:100%;padding:.6rem;border-radius:11px;border:1px solid #e2e8f0;font-family:'Inter',sans-serif">
            <option>Last 7 Days</option><option selected>Last 30 Days</option><option>Last 90 Days</option>
          </select>
        </div>
        <button onclick="toast('📄 Generating PDF report from Java data...','info')"
          style="background:#2ecc71;color:#fff;border:none;padding:.62rem 1.2rem;border-radius:11px;font-weight:600;cursor:pointer">
          <i class="fas fa-download"></i> Export PDF
        </button>
        <button onclick="loadReportData()"
          style="background:#ecfdf5;color:#1e4a3b;border:none;padding:.62rem 1.2rem;border-radius:11px;font-weight:600;cursor:pointer">
          <i class="fas fa-sync"></i> Refresh
        </button>
      </div>
    </div>
    <div class="stats-grid" id="repStats"><div style="padding:1rem;color:#6c8b81"><i class="fas fa-spinner fa-spin"></i> Loading from Java...</div></div>
    <div class="impact-bar">
      <h3><i class="fas fa-globe-americas"></i> Environmental Impact (Java computed)</h3>
      <div class="impact-grid" id="impactGrid"></div>
    </div>
    <div class="charts-grid">
      <div class="card"><div class="card-header"><h3><i class="fas fa-chart-bar"></i> Waste by Category (kg)</h3></div><canvas id="barChart" height="220"></canvas></div>
      <div class="card"><div class="card-header"><h3><i class="fas fa-chart-line"></i> Monthly Recycling Trend</h3></div><canvas id="lineChart" height="220"></canvas></div>
    </div>
    <div class="card" style="margin-bottom:1.4rem">
      <div class="card-header">
        <h3><i class="fas fa-map-marker-alt"></i> Zone Summary (Java /api/zones)</h3>
      </div>
      <div id="zoneSummary" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-top:.5rem"></div>
    </div>
    <div class="card">
      <div class="card-header">
        <h3><i class="fas fa-bell"></i> All Alerts <span class="java-badge"><i class="fas fa-coffee"></i> Java /api/alerts</span></h3>
        <button class="btn-sm" onclick="dismissAllAlerts()">Dismiss All</button>
      </div>
      <div id="allAlerts"></div>
    </div>`;
  await loadReportData();
  pollTimer=setInterval(()=>{ api('/alerts').then(a=>{ document.getElementById('notifBadge').textContent=a.filter(x=>x.type==='danger'||x.type==='warning').length; }).catch(()=>{}); },10000);
}

async function loadReportData(){
  try{
    const [stats,alerts,zones]=await Promise.all([api('/stats'),api('/alerts'),api('/zones')]);
    document.getElementById('notifBadge').textContent=alerts.filter(a=>a.type==='danger'||a.type==='warning').length;

    document.getElementById('repStats').innerHTML=`
      <div class="stat-card"><h3>Total Waste</h3><div class="stat-val">${stats.totalWaste}</div></div>
      <div class="stat-card"><h3>Recycling Rate</h3><div class="stat-val">${stats.recyclingRate}</div></div>
      <div class="stat-card"><h3>Diversion Rate</h3><div class="stat-val">${stats.diversionRate}</div></div>
      <div class="stat-card"><h3>AI Accuracy</h3><div class="stat-val">${stats.aiAccuracy}</div></div>
      <div class="stat-card"><h3>Total Detections</h3><div class="stat-val">${stats.totalDetections}</div></div>
      <div class="stat-card"><h3>Active Alerts</h3><div class="stat-val" style="color:#e74c3c">${stats.totalAlerts}</div></div>`;

    document.getElementById('impactGrid').innerHTML=`
      <div class="impact-cell"><div class="impact-val">${stats.co2Saved}</div><div>CO₂ Saved</div></div>
      <div class="impact-cell"><div class="impact-val">${stats.treesEquiv}</div><div>Trees Equivalent</div></div>
      <div class="impact-cell"><div class="impact-val">${stats.recyclingRate}</div><div>Recycling Rate</div></div>
      <div class="impact-cell"><div class="impact-val">${stats.pickupsToday}</div><div>Pickups Today</div></div>`;

    // Zone summary from Java /api/zones
    document.getElementById('zoneSummary').innerHTML=zones.map(z=>`
      <div style="background:#f0fff4;border-radius:14px;padding:.9rem;text-align:center">
        <div style="font-weight:700;color:#1a3a33">${z.zone}</div>
        <div style="font-size:.78rem;color:#6c8b81;margin-top:.4rem">
          ${z.bins} bins<br>Avg fill: <strong style="color:${z.avgFill>=75?'#e74c3c':'#2ecc71'}">${z.avgFill.toFixed(0)}%</strong><br>
          ${z.critical>0?`<span style="color:#e74c3c">⚠ ${z.critical} critical</span>`:'<span style="color:#2ecc71">✓ OK</span>'}
        </div>
      </div>`).join('');

    // Alerts list from Java with dismiss button
    document.getElementById('allAlerts').innerHTML=alerts.length?
      alerts.map(a=>`
      <div class="alert-row ${a.type}" id="alert_${a.id}">
        <i class="${a.icon}" style="font-size:1.1rem;min-width:20px"></i>
        <div style="flex:1;font-size:.83rem"><strong>${a.title}</strong><br><small style="color:#8ba89a">${a.source} • ${a.time}</small></div>
        <button class="btn-sm grey" style="padding:.2rem .6rem;font-size:.68rem" onclick="dismissAlert(${a.id})">Dismiss</button>
      </div>`).join(''):
      '<div style="padding:1rem;color:#8ba89a;text-align:center">No active alerts</div>';

    // Charts
    const barCtx=document.getElementById('barChart')?.getContext('2d');
    if(barCtx) new Chart(barCtx,{type:'bar',
      data:{labels:['Organic','Recyclable','Hazardous','Residual','E-Waste'],
        datasets:[{label:'kg (weekly)',
          data:[stats.organicKg,stats.recyclableKg,stats.hazardousKg,stats.residualKg,stats.ewasteKg],
          backgroundColor:['#2ecc71','#3498db','#e67e22','#95a5a6','#f1c40f']}]},
      options:{responsive:true,plugins:{legend:{display:false}}}});
    const lineCtx=document.getElementById('lineChart')?.getContext('2d');
    if(lineCtx) new Chart(lineCtx,{type:'line',
      data:{labels:['Jan','Feb','Mar','Apr','May','Jun','Jul'],
        datasets:[{label:'Recycling Rate %',data:[58,61,63,65,67,68,68.4],
          borderColor:'#2ecc71',backgroundColor:'rgba(46,204,113,.1)',tension:.3,fill:true}]},
      options:{responsive:true}});
  }catch(e){ console.error('Reports load error',e); }
}

window.dismissAlert=async function(id){
  try{
    // Calls Java: POST /api/alerts/{id}/dismiss
    await api(`/alerts/${id}/dismiss`,'POST');
    const el=document.getElementById('alert_'+id);
    if(el) el.style.opacity='0', setTimeout(()=>el.remove(),300);
    toast('Alert dismissed','info');
  }catch(e){ toast('⚠ Java server error','warning'); }
};

window.dismissAllAlerts=async function(){
  try{
    const alerts=await api('/alerts');
    await Promise.all(alerts.map(a=>api(`/alerts/${a.id}/dismiss`,'POST')));
    await loadReportData();
    toast('All alerts dismissed','success');
  }catch(e){ toast('⚠ Java server error','warning'); }
};

// ==================== BOOT ====================
// Auto-login if valid session exists
(async function boot(){
  if(token && curUser){
    try{
      const r=await api('/stats');
      if(r.totalWaste){ enterDash(); return; }
    }catch(e){}
  }
  token=null; curUser=null;
  localStorage.removeItem('ssg_token'); localStorage.removeItem('ssg_user');
  renderAuth();
})();
</script>
