<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Segregation | Reports & Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ecfdf5;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: linear-gradient(180deg, #0a2f2a 0%, #051f1c 100%);
            color: white;
            z-index: 100;
            transition: all 0.3s;
            box-shadow: 2px 0 20px rgba(0,0,0,0.1);
            overflow-y: auto;
        }

        .logo-area {
            padding: 2rem 1.5rem 1.5rem;
            border-bottom: 1px solid rgba(70, 170, 120, 0.3);
            margin-bottom: 2rem;
            cursor: pointer;
        }
        .logo-area h2 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }
        .logo-area h2 i {
            color: #2ecc71;
            font-size: 1.8rem;
        }
        .logo-area p {
            font-size: 0.7rem;
            color: #9bc5b4;
            margin-top: 0.5rem;
        }

        .nav-menu {
            padding: 0 1rem;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.85rem 1rem;
            margin: 0.4rem 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #d0e6dd;
            font-weight: 500;
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(46, 204, 113, 0.2);
            color: white;
        }
        .nav-item.active {
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            box-shadow: 0 2px 8px rgba(46,204,113,0.3);
        }
        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }

        .main-content {
            margin-left: 280px;
            padding: 1.5rem 2rem;
            min-height: 100vh;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            background: white;
            padding: 1rem 1.8rem;
            border-radius: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .page-title h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a3a33;
        }
        .page-title p {
            color: #6c8b81;
            font-size: 0.85rem;
            margin-top: 0.2rem;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .notification-badge {
            position: relative;
            cursor: pointer;
        }
        .notification-badge i {
            font-size: 1.4rem;
            color: #2c6e55;
        }
        .badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .user-avatar {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f0f7f4;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            cursor: pointer;
        }
        .avatar-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .avatar-icon i {
            font-size: 1.3rem;
            color: white;
        }
        .user-name {
            font-weight: 600;
            color: #1e4a3b;
        }

        .report-controls {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .filter-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .filter-item {
            flex: 1;
            min-width: 180px;
        }
        .filter-item label {
            display: block;
            font-size: 0.75rem;
            color: #6c8b81;
            margin-bottom: 0.3rem;
        }
        .filter-item select {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
        }
        .btn-export {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: white;
            padding: 1.3rem 1.5rem;
            border-radius: 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            border-left: 4px solid #2ecc71;
        }
        .stat-card h3 {
            font-size: 0.85rem;
            color: #6c8b81;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #1a3a33;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .chart-card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        canvas {
            max-height: 280px;
            width: 100%;
        }

        .impact-section {
            background: linear-gradient(135deg, #1a3a33, #0e2c26);
            border-radius: 24px;
            padding: 1.5rem;
            color: white;
            margin-bottom: 2rem;
        }
        .impact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .impact-item {
            text-align: center;
            padding: 1rem;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
        }
        .impact-value {
            font-size: 2rem;
            font-weight: 800;
        }

        @media (max-width: 1024px) {
            .main-content {
                margin-left: 0;
            }
            .sidebar {
                transform: translateX(-100%);
            }
            .charts-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-area" onclick="location.href='dashboard.html'">
            <h2><i class="fas fa-leaf"></i> SmartSeg</h2>
            <p>AI-Powered Waste Management</p>
        </div>
        <div class="nav-menu">
            <div class="nav-item" onclick="location.href='dashboard.html'">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </div>
            <div class="nav-item" onclick="location.href='waste-monitoring.html'">
                <i class="fas fa-video"></i>
                <span>Waste Monitoring</span>
            </div>
            <div class="nav-item" onclick="location.href='bin-management.html'">
                <i class="fas fa-trash-alt"></i>
                <span>Bin Management</span>
            </div>
            <div class="nav-item" onclick="location.href='ai-training.html'">
                <i class="fas fa-robot"></i>
                <span>AI Training</span>
            </div>
            <div class="nav-item active">
                <i class="fas fa-chart-line"></i>
                <span>Reports & Analytics</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="page-title">
                <h1><i class="fas fa-chart-pie"></i> Reports & Analytics</h1>
                <p><i class="fas fa-file-alt"></i> Comprehensive waste management insights</p>
            </div>
            <div class="user-info">
                <div class="notification-badge">
                    <i class="fas fa-bell"></i>
                    <span class="badge">2</span>
                </div>
                <div class="user-avatar">
                    <div class="avatar-icon"><i class="fas fa-user-check"></i></div>
                    <div class="user-name">Analyst</div>
                </div>
            </div>
        </div>

        <div class="report-controls">
            <div class="filter-group">
                <div class="filter-item">
                    <label><i class="fas fa-calendar"></i> Date Range</label>
                    <select id="dateRange">
                        <option value="week">Last 7 Days</option>
                        <option value="month" selected>Last 30 Days</option>
                        <option value="quarter">Last 90 Days</option>
                    </select>
                </div>
                <div class="filter-item">
                    <button class="btn-export" onclick="exportReport()">
                        <i class="fas fa-download"></i> Export Report (PDF)
                    </button>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3><i class="fas fa-chart-line"></i> Total Waste Processed</h3>
                <div class="stat-value">12.8 <span style="font-size:1rem;">tons</span></div>
            </div>
            <div class="stat-card">
                <h3><i class="fas fa-recycle"></i> Recycling Rate</h3>
                <div class="stat-value">68.4%</div>
            </div>
            <div class="stat-card">
                <h3><i class="fas fa-leaf"></i> Diversion Rate</h3>
                <div class="stat-value">72.3%</div>
            </div>
            <div class="stat-card">
                <h3><i class="fas fa-coins"></i> CO₂ Saved</h3>
                <div class="stat-value">3.2 <span style="font-size:1rem;">tons</span></div>
            </div>
        </div>

        <div class="impact-section">
            <h3><i class="fas fa-gl
